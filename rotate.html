<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rotate PDF — Parchment</title>
  <meta name="description" content="Rotate PDF pages 90, 180, or 270 degrees for free. Preview thumbnails, rotate individual pages. No upload — your files stay on your device.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="canonical" href="https://parchpdf.com/rotate.html">
  <meta property="og:title" content="Rotate PDF Pages — Parchment">
  <meta property="og:description" content="Rotate individual PDF pages 90°, 180°, or 270° for free. 100% private — runs in your browser.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .rotate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin-top:1rem}
    .rotate-thumb{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.5rem;text-align:center;position:relative}
    .rotate-thumb canvas{width:100%;display:block;border-radius:4px}
    .rotate-thumb .page-label{font-size:.75rem;color:var(--text-muted);margin-top:.3rem}
    .rotate-thumb .rotation-label{font-size:.7rem;color:var(--teal);font-weight:600;margin-top:.1rem}
    .rotate-thumb .thumb-btns{display:flex;gap:.25rem;justify-content:center;margin-top:.4rem}
    .rotate-thumb .thumb-btns button{background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;padding:.25rem .5rem;cursor:pointer;font-size:.8rem;transition:background .2s,color .2s}
    .rotate-thumb .thumb-btns button:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
    .bulk-controls{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;justify-content:center;margin-top:1rem;padding:.75rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius)}
    .bulk-controls span{font-size:.9rem;font-weight:600}
    .bulk-controls button{background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;padding:.4rem .75rem;cursor:pointer;font-size:.85rem;font-weight:500;transition:background .2s,color .2s}
    .bulk-controls button:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
  </style>
  <meta property="og:url" content="https://parchpdf.com/rotate.html">
  <meta property="og:image" content="https://parchpdf.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rotate PDF — Parchment">
  <meta name="twitter:description" content="Rotate PDF pages 90, 180, or 270 degrees for free. Preview thumbnails, rotate individual pages. No upload — your files stay on your device.">
  <meta name="twitter:image" content="https://parchpdf.com/og-image.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Rotate PDF - Parchment",
    "description": "Rotate PDF pages 90, 180, or 270 degrees for free. Preview thumbnails, rotate individual pages. No upload — your files stay on your device.",
    "url": "https://parchpdf.com/rotate.html",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "creator": {
      "@type": "Organization",
      "name": "Parchment",
      "url": "https://parchpdf.com"
    }
  }
  </script>
</head>
<body>
  <div style="display:none">Impact-Site-Verification: 0161bd52-e095-4b1c-aeb4-53b1caf7a9f6</div>
  <div class="tool-header">
    <h1>🔄 Rotate PDF</h1>
    <p>Rotate individual pages or all pages at once</p>
    <div class="privacy-badge">🔒 Your files never leave your device</div>
  </div>

  <div class="tool-container">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf,application/pdf">
      <div class="icon">📁</div>
      <p>Drag &amp; drop a PDF file here, or <span class="browse">browse files</span></p>
    </div>

    <div id="pdfInfo" style="display:none">
      <div class="file-list">
        <div class="file-item" id="fileInfo"></div>
      </div>

      <div class="bulk-controls">
        <span>Rotate all pages:</span>
        <button id="rotateAllLeft">↺ 90° Left</button>
        <button id="rotateAll180">↻ 180°</button>
        <button id="rotateAllRight">↻ 90° Right</button>
        <button id="resetAll">Reset All</button>
      </div>

      <div class="rotate-grid" id="pageGrid"></div>

      <div class="action-bar">
        <button class="btn btn-primary" id="saveBtn">Save Rotated PDF</button>
        <button class="btn btn-secondary" id="resetBtn">Choose Different File</button>
      </div>
    </div>

    <div class="progress-bar" id="progress"><div class="fill"></div></div>
    <div class="status-msg" id="status"></div>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
  <script src="js/common.js"></script>
  <script>
    renderNav('rotate'); renderFooter();

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfData = null, pageCount = 0, rotations = []; // degrees per page (0, 90, 180, 270)
    const pdfInfo = document.getElementById('pdfInfo');
    const fileInfo = document.getElementById('fileInfo');
    const pageGrid = document.getElementById('pageGrid');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const dropZone = document.getElementById('dropZone');
    let fileName = 'rotated.pdf';

    function reset() {
      pdfData = null; pageCount = 0; rotations = [];
      pdfInfo.style.display = 'none';
      dropZone.style.display = '';
      pageGrid.innerHTML = '';
      setStatus(status, '');
    }

    resetBtn.addEventListener('click', reset);

    async function loadPDF(file) {
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        setStatus(status, 'Please select a PDF file', 'error'); return;
      }
      setStatus(status, 'Loading PDF…');
      try {
        pdfData = new Uint8Array(await file.arrayBuffer());
        const doc = await PDFLib.PDFDocument.load(pdfData, { ignoreEncryption: true });
        pageCount = doc.getPageCount();
        rotations = new Array(pageCount).fill(0);
        fileName = file.name.replace(/\.pdf$/i, '') + '-rotated.pdf';

        fileInfo.innerHTML = `<div class="file-info">
          <div class="file-name">${file.name}</div>
          <div class="file-meta">${formatSize(file.size)} · ${pageCount} page${pageCount !== 1 ? 's' : ''}</div>
        </div>`;

        dropZone.style.display = 'none';
        pdfInfo.style.display = '';
        setStatus(status, '');

        renderThumbnails(Math.min(pageCount, 50));
      } catch (err) {
        setStatus(status, "This file doesn't appear to be a valid PDF", 'error');
      }
    }

    async function renderThumbnails(max) {
      pageGrid.innerHTML = '';
      setStatus(status, 'Rendering page previews…');
      try {
        const pdf = await pdfjsLib.getDocument({ data: pdfData.slice() }).promise;
        for (let i = 1; i <= max; i++) {
          const page = await pdf.getPage(i);
          const vp = page.getViewport({ scale: 0.4 });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

          const thumb = document.createElement('div');
          thumb.className = 'rotate-thumb';
          thumb.dataset.page = i;
          thumb.appendChild(canvas);

          const label = document.createElement('div');
          label.className = 'page-label';
          label.textContent = 'Page ' + i;
          thumb.appendChild(label);

          const rotLabel = document.createElement('div');
          rotLabel.className = 'rotation-label';
          rotLabel.textContent = '0°';
          thumb.appendChild(rotLabel);

          const btns = document.createElement('div');
          btns.className = 'thumb-btns';
          const leftBtn = document.createElement('button');
          leftBtn.textContent = '↺ 90°';
          leftBtn.title = 'Rotate left 90°';
          leftBtn.addEventListener('click', () => rotatePage(i - 1, -90, thumb));
          const rightBtn = document.createElement('button');
          rightBtn.textContent = '↻ 90°';
          rightBtn.title = 'Rotate right 90°';
          rightBtn.addEventListener('click', () => rotatePage(i - 1, 90, thumb));
          btns.appendChild(leftBtn);
          btns.appendChild(rightBtn);
          thumb.appendChild(btns);

          pageGrid.appendChild(thumb);
        }
        if (pageCount > max) {
          const note = document.createElement('div');
          note.style.cssText = 'grid-column:1/-1;text-align:center;font-size:.85rem;color:var(--text-muted);padding:.5rem';
          note.textContent = `Showing first ${max} of ${pageCount} pages. All pages will be rotated when using bulk controls.`;
          pageGrid.appendChild(note);
        }
        setStatus(status, '');
      } catch (e) {
        setStatus(status, 'Could not render previews, but rotation will still work', 'error');
      }
    }

    function rotatePage(idx, delta, thumbEl) {
      rotations[idx] = ((rotations[idx] + delta) % 360 + 360) % 360;
      updateThumbVisual(idx, thumbEl);
    }

    function updateThumbVisual(idx, thumbEl) {
      const canvas = thumbEl.querySelector('canvas');
      const rotLabel = thumbEl.querySelector('.rotation-label');
      canvas.style.transform = 'rotate(' + rotations[idx] + 'deg)';
      rotLabel.textContent = rotations[idx] + '°';
      if (rotations[idx] !== 0) {
        rotLabel.style.color = 'var(--teal)';
        thumbEl.style.borderColor = 'var(--teal)';
      } else {
        rotLabel.style.color = 'var(--text-muted)';
        thumbEl.style.borderColor = 'var(--border)';
      }
    }

    function rotateAll(delta) {
      const thumbs = pageGrid.querySelectorAll('.rotate-thumb');
      for (let i = 0; i < pageCount; i++) {
        rotations[i] = ((rotations[i] + delta) % 360 + 360) % 360;
        if (i < thumbs.length) updateThumbVisual(i, thumbs[i]);
      }
    }

    function resetAllRotations() {
      const thumbs = pageGrid.querySelectorAll('.rotate-thumb');
      for (let i = 0; i < pageCount; i++) {
        rotations[i] = 0;
        if (i < thumbs.length) updateThumbVisual(i, thumbs[i]);
      }
    }

    document.getElementById('rotateAllLeft').addEventListener('click', () => rotateAll(-90));
    document.getElementById('rotateAll180').addEventListener('click', () => rotateAll(180));
    document.getElementById('rotateAllRight').addEventListener('click', () => rotateAll(90));
    document.getElementById('resetAll').addEventListener('click', resetAllRotations);

    saveBtn.addEventListener('click', async () => {
      if (!rotations.some(r => r !== 0)) {
        setStatus(status, 'No pages have been rotated', 'error'); return;
      }
      saveBtn.disabled = true;
      setStatus(status, 'Applying rotations…');
      setProgress(progress, 20);
      try {
        const doc = await PDFLib.PDFDocument.load(pdfData, { ignoreEncryption: true });
        const pages = doc.getPages();
        for (let i = 0; i < pages.length; i++) {
          if (rotations[i] !== 0) {
            const current = pages[i].getRotation().angle;
            pages[i].setRotation(PDFLib.degrees(current + rotations[i]));
          }
          setProgress(progress, 20 + (60 * (i + 1) / pages.length));
        }
        const bytes = await doc.save();
        setProgress(progress, 95);
        downloadBlob(new Blob([bytes], { type: 'application/pdf' }), fileName);
        setProgress(progress, 100);
        const rotated = rotations.filter(r => r !== 0).length;
        setStatus(status, `Rotated ${rotated} page${rotated !== 1 ? 's' : ''} — downloading`, 'success');
      } catch (err) {
        setStatus(status, 'Error: ' + err.message, 'error');
      }
      setProgress(progress, 0);
      saveBtn.disabled = false;
    });

    setupDropZone(dropZone, {
      accept: f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'),
      onFiles: fs => loadPDF(fs[0])
    });
  </script>
  <script data-goatcounter="https://parchpdf.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
