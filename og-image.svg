<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="600" cy="0" rx="700" ry="300" fill="url(#glow)"/>

  <!-- Decorative grid dots -->
  <g fill="#3b82f6" opacity="0.06">
    <circle cx="60" cy="60" r="2"/>
    <circle cx="120" cy="60" r="2"/>
    <circle cx="180" cy="60" r="2"/>
    <circle cx="240" cy="60" r="2"/>
    <circle cx="300" cy="60" r="2"/>
    <circle cx="60" cy="120" r="2"/>
    <circle cx="120" cy="120" r="2"/>
    <circle cx="180" cy="120" r="2"/>
    <circle cx="240" cy="120" r="2"/>
    <circle cx="300" cy="120" r="2"/>
    <circle cx="900" cy="500" r="2"/>
    <circle cx="960" cy="500" r="2"/>
    <circle cx="1020" cy="500" r="2"/>
    <circle cx="1080" cy="500" r="2"/>
    <circle cx="1140" cy="500" r="2"/>
    <circle cx="900" cy="560" r="2"/>
    <circle cx="960" cy="560" r="2"/>
    <circle cx="1020" cy="560" r="2"/>
    <circle cx="1080" cy="560" r="2"/>
    <circle cx="1140" cy="560" r="2"/>
  </g>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- PDF icon -->
  <g transform="translate(530, 100)">
    <rect x="0" y="0" width="44" height="56" rx="4" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
    <rect x="0" y="0" width="44" height="56" rx="4" fill="#3b82f6" opacity="0.08"/>
    <path d="M28 0 L44 16" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
    <path d="M28 0 L28 16 L44 16" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
    <text x="22" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#3b82f6" opacity="0.9">PDF</text>
  </g>

  <!-- Smaller decorative icons left -->
  <g transform="translate(180, 140)" opacity="0.15">
    <rect width="30" height="38" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="14" x2="23" y2="14" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="20" x2="20" y2="20" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="26" x2="17" y2="26" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <g transform="translate(990, 120)" opacity="0.15">
    <rect width="30" height="38" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="14" x2="23" y2="14" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="20" x2="20" y2="20" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="7" y1="26" x2="17" y2="26" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- Main title: Parchment -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="url(#accent)" letter-spacing="-1">Parchment</text>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">15+ Free PDF Tools</text>

  <!-- Divider line -->
  <rect x="500" y="315" width="200" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>

  <!-- Privacy tagline -->
  <g transform="translate(600, 355)">
    <!-- Lock icon -->
    <g transform="translate(-185, -14)">
      <rect x="0" y="8" width="16" height="12" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
      <path d="M3 8 V5 A5 5 0 0 1 13 5 V8" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="8" cy="15" r="1.5" fill="#60a5fa"/>
    </g>
    <text x="0" y="0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="0.5">Privacy-First &#8212; Files Never Leave Your Device</text>
  </g>

  <!-- Tool pills -->
  <g transform="translate(600, 420)">
    <!-- Merge -->
    <rect x="-380" y="-18" width="105" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-327" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Merge</text>

    <!-- Split -->
    <rect x="-258" y="-18" width="90" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-213" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Split</text>

    <!-- Compress -->
    <rect x="-150" y="-18" width="120" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-90" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Compress</text>

    <!-- Convert -->
    <rect x="-14" y="-18" width="110" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="41" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Convert</text>

    <!-- Sign -->
    <rect x="114" y="-18" width="85" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="156" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Sign</text>

    <!-- Protect -->
    <rect x="217" y="-18" width="105" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="269" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa">Protect</text>
  </g>

  <!-- Second row of pills -->
  <g transform="translate(600, 472)">
    <!-- Watermark -->
    <rect x="-250" y="-18" width="125" height="36" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
    <text x="-187" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" opacity="0.7">Watermark</text>

    <!-- Extract -->
    <rect x="-108" y="-18" width="105" height="36" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
    <text x="-55" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" opacity="0.7">Extract</text>

    <!-- Rotate -->
    <rect x="14" y="-18" width="100" height="36" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
    <text x="64" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" opacity="0.7">Rotate</text>

    <!-- Flatten -->
    <rect x="131" y="-18" width="105" height="36" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
    <text x="183" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" opacity="0.7">Flatten</text>
  </g>

  <!-- Bottom: parchpdf.com -->
  <text x="600" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#475569" letter-spacing="2">parchpdf.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
