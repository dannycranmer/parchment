<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Merge PDF — Parchment</title>
  <meta name="description" content="Merge multiple PDF files into one document for free. No upload required — your files stay on your device.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="canonical" href="https://parchpdf.com/merge.html">
  <meta property="og:title" content="Merge PDF Online Free — Parchment">
  <meta property="og:description" content="Combine multiple PDF files into one document for free. No upload required — your files stay on your device.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://parchpdf.com/merge.html">
  <meta property="og:image" content="https://parchpdf.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Merge PDF — Parchment">
  <meta name="twitter:description" content="Merge multiple PDF files into one document for free. No upload required — your files stay on your device.">
  <meta name="twitter:image" content="https://parchpdf.com/og-image.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Merge PDF - Parchment",
    "description": "Merge multiple PDF files into one document for free. No upload required — your files stay on your device.",
    "url": "https://parchpdf.com/merge.html",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "creator": {
      "@type": "Organization",
      "name": "Parchment",
      "url": "https://parchpdf.com"
    }
  }
  </script>
</head>
<body>
  <div style="display:none">Impact-Site-Verification: 0161bd52-e095-4b1c-aeb4-53b1caf7a9f6</div>
  <div class="tool-header">
    <h1>📑 Merge PDF</h1>
    <p>Combine multiple PDF files into a single document</p>
    <div class="privacy-badge">🔒 Your files never leave your browser — no uploads, 100% private</div>
  </div>

  <div class="tool-container">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf,application/pdf" multiple>
      <div class="icon">📁</div>
      <p>Drag &amp; drop PDF files here, or <span class="browse">browse files</span></p>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="action-bar">
      <button class="btn btn-primary" id="mergeBtn" disabled>Merge PDFs</button>
      <button class="btn btn-secondary" id="clearBtn" style="display:none">Clear All</button>
    </div>

    <div class="progress-bar" id="progress"><div class="fill"></div></div>
    <div class="status-msg" id="status"></div>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
  <script src="js/common.js"></script>
  <script>
    renderNav('merge'); renderFooter();

    const files = [];
    const fileList = document.getElementById('fileList');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');

    function updateUI() {
      mergeBtn.disabled = files.length < 2;
      clearBtn.style.display = files.length ? '' : 'none';
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-meta">${formatSize(f.size)}${f.pages ? ' · ' + f.pages + ' pages' : ''}</div>
          </div>
          <div class="move-btns">
            <button title="Move up" data-action="up" data-i="${i}">▲</button>
            <button title="Move down" data-action="down" data-i="${i}">▼</button>
          </div>
          <button title="Remove" data-action="remove" data-i="${i}">✕</button>`;
        fileList.appendChild(div);
      });
    }

    fileList.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const i = parseInt(btn.dataset.i);
      if (btn.dataset.action === 'remove') { files.splice(i, 1); }
      else if (btn.dataset.action === 'up' && i > 0) { [files[i-1], files[i]] = [files[i], files[i-1]]; }
      else if (btn.dataset.action === 'down' && i < files.length-1) { [files[i], files[i+1]] = [files[i+1], files[i]]; }
      updateUI();
    });

    clearBtn.addEventListener('click', () => { files.length = 0; updateUI(); setStatus(status, ''); });

    async function addFiles(newFiles) {
      for (const file of newFiles) {
        if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
          setStatus(status, `"${file.name}" is not a PDF file`, 'error');
          continue;
        }
        const entry = { name: file.name, size: file.size, data: null, pages: null };
        try {
          entry.data = new Uint8Array(await file.arrayBuffer());
          const doc = await PDFLib.PDFDocument.load(entry.data, { ignoreEncryption: true });
          entry.pages = doc.getPageCount();
        } catch (err) {
          setStatus(status, `"${file.name}" doesn't appear to be a valid PDF`, 'error');
          continue;
        }
        files.push(entry);
      }
      updateUI();
      setStatus(status, '');
    }

    setupDropZone(document.getElementById('dropZone'), {
      accept: f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'),
      onFiles: addFiles
    });

    mergeBtn.addEventListener('click', async () => {
      mergeBtn.disabled = true;
      setStatus(status, 'Merging…');
      setProgress(progress, 10);
      try {
        const merged = await PDFLib.PDFDocument.create();
        for (let i = 0; i < files.length; i++) {
          const src = await PDFLib.PDFDocument.load(files[i].data, { ignoreEncryption: true });
          const pages = await merged.copyPages(src, src.getPageIndices());
          pages.forEach(p => merged.addPage(p));
          setProgress(progress, 10 + (80 * (i + 1) / files.length));
        }
        const bytes = await merged.save();
        downloadBlob(new Blob([bytes], { type: 'application/pdf' }), 'merged.pdf');
        setProgress(progress, 100);
        setStatus(status, `Done! Merged ${files.length} files (${merged.getPageCount()} pages)`, 'success');
      } catch (err) {
        setStatus(status, 'Error merging: ' + err.message, 'error');
      }
      setProgress(progress, 0);
      mergeBtn.disabled = files.length < 2;
    });
  </script>
  <script data-goatcounter="https://parchpdf.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
