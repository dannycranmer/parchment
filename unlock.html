<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Remove PDF Password Online Free — Parchment</title>
  <meta name="description" content="Remove password protection from PDF files for free. Enter the password you know and download an unlocked copy. No upload required — your files stay on your device.">
  <meta property="og:title" content="Remove PDF Password Online Free — Parchment">
  <meta property="og:description" content="Unlock password-protected PDFs without uploading your files. 100% private — runs in your browser.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://dannycranmer.github.io/parchment/unlock.html">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="tool-header">
    <h1>🔓 Unlock PDF</h1>
    <p>Remove password protection from your PDF — you must know the password</p>
    <div class="privacy-badge">🔒 Your files never leave your device</div>
  </div>

  <div class="tool-container">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf,application/pdf">
      <div class="icon">📁</div>
      <p>Drag &amp; drop a password-protected PDF here, or <span class="browse">browse files</span></p>
    </div>

    <div id="pdfInfo" style="display:none">
      <div class="file-list">
        <div class="file-item" id="fileInfo"></div>
      </div>

      <div class="options">
        <h3>PDF Password</h3>
        <div class="option-row">
          <label for="pdfPassword">Password:</label>
          <input type="text" id="pdfPassword" placeholder="Enter the PDF password" autocomplete="off">
        </div>
        <div class="option-row" style="font-size:.85rem;color:var(--text-muted)">
          Enter the password used to protect this PDF. The unlocked file will have no password restriction.
        </div>
      </div>

      <div class="action-bar">
        <button class="btn btn-primary" id="unlockBtn">Unlock PDF</button>
        <button class="btn btn-secondary" id="resetBtn">Choose Different File</button>
      </div>

      <div id="resultPanel" style="display:none">
        <div class="file-list" style="margin-top:1rem">
          <div class="file-item" id="resultInfo"></div>
        </div>
        <div class="action-bar">
          <button class="btn btn-primary" id="downloadBtn">Download Unlocked PDF</button>
        </div>
      </div>
    </div>

    <div class="progress-bar" id="progress"><div class="fill"></div></div>
    <div class="status-msg" id="status"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    renderNav('unlock'); renderFooter();

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfData = null, resultBlob = null;
    const pdfInfo = document.getElementById('pdfInfo');
    const fileInfo = document.getElementById('fileInfo');
    const resultPanel = document.getElementById('resultPanel');
    const resultInfo = document.getElementById('resultInfo');
    const unlockBtn = document.getElementById('unlockBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const dropZone = document.getElementById('dropZone');
    const passwordInput = document.getElementById('pdfPassword');

    let originalName = 'document.pdf', originalSize = 0;

    function reset() {
      pdfData = null; resultBlob = null;
      pdfInfo.style.display = 'none';
      resultPanel.style.display = 'none';
      dropZone.style.display = '';
      passwordInput.value = '';
      setStatus(status, '');
    }

    resetBtn.addEventListener('click', reset);

    async function loadPDF(file) {
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        setStatus(status, 'Please select a PDF file', 'error'); return;
      }
      setStatus(status, 'Loading PDF…');
      try {
        pdfData = new Uint8Array(await file.arrayBuffer());
        originalName = file.name;
        originalSize = file.size;

        fileInfo.innerHTML = `<div class="file-info">
          <div class="file-name">${file.name}</div>
          <div class="file-meta">${formatSize(file.size)}</div>
        </div>`;

        dropZone.style.display = 'none';
        pdfInfo.style.display = '';
        resultPanel.style.display = 'none';
        resultBlob = null;
        setStatus(status, '');
        passwordInput.focus();
      } catch (err) {
        setStatus(status, "This file doesn't appear to be a valid PDF", 'error');
      }
    }

    unlockBtn.addEventListener('click', async () => {
      const password = passwordInput.value;
      if (!password) {
        setStatus(status, 'Please enter the PDF password', 'error');
        passwordInput.focus();
        return;
      }

      unlockBtn.disabled = true;
      resultPanel.style.display = 'none';
      setStatus(status, 'Unlocking PDF…');
      setProgress(progress, 10);

      try {
        // Use pdf.js to open with the password and re-render all pages
        const pdf = await pdfjsLib.getDocument({ data: pdfData.slice(), password }).promise;
        const pageCount = pdf.numPages;

        setProgress(progress, 20);

        // Create a new unprotected PDF with pdf-lib
        const newDoc = await PDFLib.PDFDocument.create();

        for (let i = 1; i <= pageCount; i++) {
          const page = await pdf.getPage(i);
          const vp = page.getViewport({ scale: 2 }); // High quality render
          const origVp = page.getViewport({ scale: 1 });

          const canvas = document.createElement('canvas');
          canvas.width = vp.width;
          canvas.height = vp.height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          await page.render({ canvasContext: ctx, viewport: vp }).promise;

          // Use PNG for lossless quality
          const pngBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
          const pngBytes = new Uint8Array(await pngBlob.arrayBuffer());
          const img = await newDoc.embedPng(pngBytes);

          const newPage = newDoc.addPage([origVp.width, origVp.height]);
          newPage.drawImage(img, { x: 0, y: 0, width: origVp.width, height: origVp.height });

          setProgress(progress, 20 + (70 * i / pageCount));
        }

        const unlockedBytes = await newDoc.save();
        resultBlob = new Blob([unlockedBytes], { type: 'application/pdf' });

        resultInfo.innerHTML = `<div class="file-info">
          <div class="file-name">✅ PDF unlocked successfully</div>
          <div class="file-meta">${pageCount} page${pageCount !== 1 ? 's' : ''} · ${formatSize(unlockedBytes.length)}</div>
        </div>`;

        resultPanel.style.display = '';
        setProgress(progress, 100);
        setStatus(status, `Done! Unlocked ${pageCount} page${pageCount !== 1 ? 's' : ''}`, 'success');
      } catch (err) {
        if (err.name === 'PasswordException' || (err.message && err.message.includes('password'))) {
          setStatus(status, 'Incorrect password. Please try again.', 'error');
        } else {
          setStatus(status, 'Error: ' + err.message, 'error');
        }
      }
      setProgress(progress, 0);
      unlockBtn.disabled = false;
    });

    // Allow pressing Enter in password field to unlock
    passwordInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') unlockBtn.click();
    });

    downloadBtn.addEventListener('click', () => {
      if (resultBlob) {
        const name = originalName.replace(/\.pdf$/i, '') + '-unlocked.pdf';
        downloadBlob(resultBlob, name);
      }
    });

    setupDropZone(dropZone, {
      accept: f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'),
      onFiles: fs => loadPDF(fs[0])
    });
  </script>
  <script data-goatcounter="https://dairylea.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
