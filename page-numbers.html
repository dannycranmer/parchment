  <style>
    .pn-section{margin-top:1rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
    .pn-section h3{font-size:.95rem;font-weight:700;margin-bottom:.75rem}
    .pn-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:.6rem}
    .pn-row:last-child{margin-bottom:0}
    .pn-row label{font-size:.9rem;font-weight:500;min-width:110px}
    .pn-row input[type="text"],.pn-row input[type="number"],.pn-row select{padding:.45rem .65rem;border:1px solid var(--border);border-radius:6px;font-size:.9rem;background:var(--bg)}
    .pn-row input[type="text"]{flex:1;max-width:350px}
    .pn-row input[type="number"]{width:90px}
    .pn-row input[type="color"]{width:40px;height:34px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px}
    .pn-row input:focus,.pn-row select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(42,123,111,.15)}
    .pn-preview-wrap{margin-top:1rem;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
    .pn-preview-wrap h3{font-size:.9rem;font-weight:600;margin-bottom:.5rem;color:var(--text-muted)}
    .pn-preview-wrap canvas{max-width:100%;border:1px solid var(--border);border-radius:4px;background:#fff}
    .pos-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:4px;max-width:260px}
    .pos-grid label{display:flex;align-items:center;justify-content:center;padding:.4rem .3rem;border:2px solid var(--border);border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:500;text-align:center;transition:border-color .15s,background .15s}
    .pos-grid input[type="radio"]{display:none}
    .pos-grid input[type="radio"]:checked+span{color:var(--teal)}
    .pos-grid label:has(input:checked){border-color:var(--teal);background:rgba(42,123,111,.06)}
    .pn-format-hint{font-size:.78rem;color:var(--text-muted);margin-top:.3rem}
  </style>

<body>
  <div style="display:none">Impact-Site-Verification: 0161bd52-e095-4b1c-aeb4-53b1caf7a9f6</div>
  <div class="tool-header">
    <h1>🔢 Page Numbers</h1>
    <p>Add page numbers to every page of your PDF</p>
    <div class="privacy-badge">🔒 Your files never leave your device</div>
  </div>

  <div class="tool-container">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf,application/pdf">
      <div class="icon">📁</div>
      <p>Drag &amp; drop a PDF file here, or <span class="browse">browse files</span></p>
    </div>

    <div id="pdfInfo" style="display:none">
      <div class="file-list">
        <div class="file-item" id="fileInfo"></div>
      </div>

      <div class="pn-section">
        <h3>Page Number Settings</h3>

        <div class="pn-row">
          <label>Position</label>
          <div class="pos-grid">
            <label><input type="radio" name="pos" value="top-left"><span>Top Left</span></label>
            <label><input type="radio" name="pos" value="top-center"><span>Top Center</span></label>
            <label><input type="radio" name="pos" value="top-right"><span>Top Right</span></label>
            <label><input type="radio" name="pos" value="bottom-left"><span>Bottom Left</span></label>
            <label><input type="radio" name="pos" value="bottom-center" checked><span>Bottom Center</span></label>
            <label><input type="radio" name="pos" value="bottom-right"><span>Bottom Right</span></label>
          </div>
        </div>

        <div class="pn-row">
          <label for="startNum">Start Number</label>
          <input type="number" id="startNum" value="1" min="0" max="9999">
        </div>

        <div class="pn-row">
          <label for="pnFormat">Format</label>
          <select id="pnFormat">
            <option value="number">1, 2, 3…</option>
            <option value="dash">— 1 —</option>
            <option value="page">Page 1</option>
            <option value="pageOf">Page 1 of N</option>
          </select>
        </div>

        <div class="pn-row">
          <label for="pnSize">Font Size</label>
          <input type="number" id="pnSize" value="12" min="6" max="72" step="1">
        </div>

        <div class="pn-row">
          <label for="pnColor">Color</label>
          <input type="color" id="pnColor" value="#333333">
        </div>

        <div class="pn-row">
          <label for="pnMargin">Margin (pt)</label>
          <input type="number" id="pnMargin" value="30" min="5" max="150" step="5">
        </div>

        <div class="pn-row">
          <label for="pnSkipFirst">Skip first page</label>
          <input type="checkbox" id="pnSkipFirst" style="width:auto">
        </div>
      </div>

      <div class="pn-preview-wrap" id="previewWrap" style="display:none">
        <h3>Preview (Page 1)</h3>
        <canvas id="previewCanvas"></canvas>
      </div>

      <div class="action-bar">
        <button class="btn btn-primary" id="addBtn">Add Page Numbers</button>
        <button class="btn btn-secondary" id="previewBtn">Preview</button>
        <button class="btn btn-secondary" id="resetBtn">Choose Different File</button>
      </div>
    </div>

    <div class="progress-bar" id="progress"><div class="fill"></div></div>
    <div class="status-msg" id="status"></div>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
  <script src="js/common.js"></script>
  <script>
    renderNav('page-numbers'); renderFooter();

    const dropZone = document.getElementById('dropZone');
    const pdfInfo = document.getElementById('pdfInfo');
    const fileInfo = document.getElementById('fileInfo');
    const addBtn = document.getElementById('addBtn');
    const previewBtn = document.getElementById('previewBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const previewWrap = document.getElementById('previewWrap');
    const previewCanvas = document.getElementById('previewCanvas');

    let pdfData = null, pdfFileName = '', totalPages = 0;

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function reset() {
      pdfData = null; pdfFileName = ''; totalPages = 0;
      pdfInfo.style.display = 'none';
      previewWrap.style.display = 'none';
      dropZone.style.display = '';
      setStatus(status, '');
    }
    resetBtn.addEventListener('click', reset);

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16) / 255,
        g: parseInt(hex.slice(3, 5), 16) / 255,
        b: parseInt(hex.slice(5, 7), 16) / 255
      };
    }

    function getPosition() {
      const checked = document.querySelector('input[name="pos"]:checked');
      return checked ? checked.value : 'bottom-center';
    }

    function getConfig() {
      return {
        position: getPosition(),
        startNum: parseInt(document.getElementById('startNum').value) || 1,
        format: document.getElementById('pnFormat').value,
        size: parseInt(document.getElementById('pnSize').value) || 12,
        color: hexToRgb(document.getElementById('pnColor').value),
        margin: parseInt(document.getElementById('pnMargin').value) || 30,
        skipFirst: document.getElementById('pnSkipFirst').checked
      };
    }

    function formatPageNum(cfg, pageIndex, total) {
      const num = cfg.startNum + pageIndex;
      switch (cfg.format) {
        case 'dash': return '\u2014 ' + num + ' \u2014';
        case 'page': return 'Page ' + num;
        case 'pageOf': return 'Page ' + num + ' of ' + (cfg.startNum + total - 1);
        default: return String(num);
      }
    }

    async function loadPDF(file) {
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        setStatus(status, 'Please select a PDF file', 'error'); return;
      }
      setStatus(status, 'Loading PDF\u2026');
      try {
        pdfData = new Uint8Array(await file.arrayBuffer());
        const doc = await PDFLib.PDFDocument.load(pdfData);
        totalPages = doc.getPageCount();
        pdfFileName = file.name;
        fileInfo.innerHTML = '<div class="file-info"><div class="file-name">' + escapeHtml(file.name) +
          '</div><div class="file-meta">' + formatSize(file.size) + ' \u00b7 ' + totalPages + ' page' + (totalPages !== 1 ? 's' : '') + '</div></div>';
        dropZone.style.display = 'none';
        pdfInfo.style.display = '';
        previewWrap.style.display = 'none';
        setStatus(status, '');
      } catch (err) {
        if (err.message && (err.message.includes('encrypt') || err.message.includes('password'))) {
          setStatus(status, 'This PDF is encrypted. Use the Unlock tool first.', 'error');
        } else {
          setStatus(status, "This file doesn't appear to be a valid PDF", 'error');
        }
        pdfData = null;
      }
    }

    setupDropZone(dropZone, {
      accept: f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'),
      onFiles: fs => loadPDF(fs[0])
    });

    function drawPageNumber(page, text, cfg, font) {
      const { width, height } = page.getSize();
      const textWidth = font.widthOfTextAtSize(text, cfg.size);
      const pos = cfg.position.split('-');
      const vPos = pos[0]; // top or bottom
      const hPos = pos[1]; // left, center, right

      let x, y;

      if (hPos === 'left') x = cfg.margin;
      else if (hPos === 'right') x = width - textWidth - cfg.margin;
      else x = (width - textWidth) / 2;

      if (vPos === 'top') y = height - cfg.margin;
      else y = cfg.margin;

      page.drawText(text, {
        x, y,
        size: cfg.size,
        font: font,
        color: PDFLib.rgb(cfg.color.r, cfg.color.g, cfg.color.b)
      });
    }

    /* Preview first page */
    previewBtn.addEventListener('click', async () => {
      if (!pdfData) return;
      const cfg = getConfig();

      setStatus(status, 'Generating preview\u2026');
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdfDoc = await pdfjsLib.getDocument({ data: pdfData.slice() }).promise;
        const page = await pdfDoc.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });

        previewCanvas.width = viewport.width;
        previewCanvas.height = viewport.height;
        const ctx = previewCanvas.getContext('2d');

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

        /* Draw page number preview on canvas */
        if (!cfg.skipFirst) {
          const text = formatPageNum(cfg, 0, totalPages);
          const scale = viewport.scale;
          const colorHex = document.getElementById('pnColor').value;
          ctx.fillStyle = colorHex;
          ctx.font = (cfg.size * scale) + 'px Helvetica, Arial, sans-serif';

          const pos = cfg.position.split('-');
          const vPos = pos[0];
          const hPos = pos[1];
          const textWidth = ctx.measureText(text).width;
          const margin = cfg.margin * scale;

          let x, y;
          if (hPos === 'left') { ctx.textAlign = 'left'; x = margin; }
          else if (hPos === 'right') { ctx.textAlign = 'right'; x = viewport.width - margin; }
          else { ctx.textAlign = 'center'; x = viewport.width / 2; }

          if (vPos === 'top') y = margin;
          else y = viewport.height - margin;

          ctx.fillText(text, x, y);
        }

        previewWrap.style.display = '';
        setStatus(status, cfg.skipFirst ? 'First page skipped — preview shows no number' : '');
        pdfDoc.destroy();
      } catch (err) {
        console.error(err);
        setStatus(status, 'Preview error: ' + err.message, 'error');
      }
    });

    /* Add page numbers to all pages */
    addBtn.addEventListener('click', async () => {
      if (!pdfData) return;
      const cfg = getConfig();

      addBtn.disabled = true;
      setStatus(status, 'Adding page numbers\u2026');
      setProgress(progress, 10);

      try {
        const doc = await PDFLib.PDFDocument.load(pdfData);
        const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);
        const pages = doc.getPages();

        for (let i = 0; i < pages.length; i++) {
          if (cfg.skipFirst && i === 0) continue;
          const pageIndex = cfg.skipFirst ? i - 1 : i;
          const text = formatPageNum(cfg, pageIndex, cfg.skipFirst ? pages.length - 1 : pages.length);
          drawPageNumber(pages[i], text, cfg, font);
          setProgress(progress, 10 + (80 * (i + 1) / pages.length));
        }

        const outBytes = await doc.save();
        const outName = pdfFileName.replace(/\.pdf$/i, '') + '-numbered.pdf';
        downloadBlob(new Blob([outBytes], { type: 'application/pdf' }), outName);

        setProgress(progress, 100);
        setStatus(status, 'Page numbers added to ' + (cfg.skipFirst ? (pages.length - 1) : pages.length) + ' page' + ((cfg.skipFirst ? pages.length - 1 : pages.length) !== 1 ? 's' : '') + '!', 'success');
      } catch (err) {
        console.error(err);
        setStatus(status, 'Error: ' + err.message, 'error');
      }

      setProgress(progress, 0);
      addBtn.disabled = false;
    });
  </script>
  <script data-goatcounter="https://parchpdf.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
